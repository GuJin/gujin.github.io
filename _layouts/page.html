---
layout: default
---

<article class="page">
  <header class="page-hero">
    {% if page.kicker %}
      <p class="kicker">{{ page.kicker }}</p>
    {% endif %}
    <h1>{{ page.heading | default: page.title }}</h1>
    {% if page.description %}
      <p class="lede">{{ page.description }}</p>
    {% endif %}
  </header>
  <div class="rich-content">
    {{ content }}
  </div>
</article>
